|<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Pagina de login</title>
    <link href="css/bootstrap/style.css" rel="stylesheet">
</head>
<body>

<div class="container text-center mt-5">
    <h2 class="mb-4">PLENÁRIA</h2>

    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="login-box">
                <form action="presidente.html" ><!-- method= "post"(ainda não da, esta quebrando o codigo)-->
                    
                    <!-- EMAIL -->
                    <div class="mb-3 text-start">
                        <label class="form-label">EMAIL:</label>
                        <input type="email" name="email" class="form-control" placeholder="Digite seu email institucional" required>
                    </div>

                    <!-- SENHA -->
                    <div class="mb-3 text-start">
                        <label class="form-label">Senha:</label>
                        <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required>
                    </div>

                    <!-- BOTÃO -->
                        <button class="btn btn-confirmar w-100">ENTRAR</button>
                    
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
