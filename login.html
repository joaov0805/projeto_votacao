<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Votação</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="urna-login.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">


<div class="urna shadow-lg">
    
    <div class="tela p-5">

        <h3 class="text-center fw-bold mb-4">Acesso ao Sistema</h3>

        <form action="login_processa.php" method="POST">

            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" name="email" 
                       class="form-control form-control-lg" 
                       placeholder="Digite seu email" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Senha</label>
                <input type="password" name="senha" 
                       class="form-control form-control-lg" 
                       placeholder="Digite sua senha" required>
            </div>

            <button type="submit" 
                    class="btn btn-success w-100 btn-lg fw-bold">
                ENTRAR
            </button>
        </form>

    </div>

</div>

</body>
</html>
