<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urna Eletrônica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="urna-container">

    
    <div class="tela">
        <div class="tela-conteudo">
            <h2 class="cargo">VOTO PARA</h2>
            <h1 class="numero-digito" id="numero">__ __</h1>

            <div id="info-candidato" class="info">
                
            </div>
        </div>
    </div>
   
    <div class="teclado">
        <div class="linha">
            <button class="tecla" onclick="digitar('1')">1</button>
            <button class="tecla" onclick="digitar('2')">2</button>
            <button class="tecla" onclick="digitar('3')">3</button>
        </div>
        <div class="linha">
            <button class="tecla" onclick="digitar('4')">4</button>
            <button class="tecla" onclick="digitar('5')">5</button>
            <button class="tecla" onclick="digitar('6')">6</button>
        </div>
        <div class="linha">
            <button class="tecla" onclick="digitar('7')">7</button>
            <button class="tecla" onclick="digitar('8')">8</button>
            <button class="tecla" onclick="digitar('9')">9</button>
        </div>
        <div class="linha">
            <button class="tecla" onclick="digitar('0')">0</button>
        </div>

       
        <div class="linha-funcao">
            <button class="tecla branco" onclick="votoBranco()">BRANCO</button>
            <button class="tecla corrige" onclick="corrige()">CORRIGE</button>
            <button class="tecla confirma" onclick="confirma()">CONFIRMA</button>
        </div>
    </div>
</div>

<script>
    let numeroDigitado = "";

    function digitar(n) {
        if (numeroDigitado.length < 2) {
            numeroDigitado += n;
            atualizarDisplay();
        }
    }

    function atualizarDisplay() {
        let display = numeroDigitado.padEnd(2, "_ ").replace(/ /g, "");
        document.getElementById("numero").innerText = display;
    }

    function corrige() {
        numeroDigitado = "";
        atualizarDisplay();
    }

    function votoBranco() {
        alert("Voto em BRANCO selecionado.");
    }

    function confirma() {
        if (numeroDigitado.length === 0) {
            alert("Selecione um número ou BRANCO.");
            return;
        }
        alert("Voto CONFIRMADO: " + numeroDigitado);
    }
</script>

</body>
</html>
