<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulação de Votação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <img src="img/103-1036161_brazil-coat-of-arms-republica-federativa-do-brasil-brazil-coat-of-arms.png" class="img-fluid mx-auto d-block" width="130" >
    <link href="css/bootstrap/votacao.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">
    <div class="row">

        <!-- Área principal -->
        <div class="col-md-9">
            <div class="urna">

                <!-- Cabeçalho -->
                <div class="text-center mb-3">
                    <h5 class="mt-2">SEU VOTO PARA</h5>
                    <h4><strong>Presidente</strong></h4>
                    
                </div>

                <!-- Conteúdo -->
                <div class="row">
                    <div class="col-md-8">
                        <p><strong>Número:</strong> 01</p>
                        <p><strong>Nome:</strong> Luana Gonçalves</p>
                    </div>

                    <div class="col-md-4 text-center">
                        <div class="candidato-foto">
                            <img src="img/small_Luana_Limoeiro_ecdacfcf56.png" class="img-fluid">
                            <div><strong>Presidente</strong></div>
                        </div>
                    </div>
                </div>

                <!-- Rodapé -->
                <div class="rodape row">
                    <div class="col-md-6">
                        <p><strong>Aperte a tecla:</strong><br>
                        CONFIRMA para CONFIRMAR este voto.</p>
                    </div>
                   
                    <div class="col-md-6 text-end">
                        <p>CLIQUE no nome para<br>
                        ESCOLHER seu candidato</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- Lateral direita -->
        <div class="col-md-3">
            <h6 class="text-center mb-2">Escolha seu candidato</h6>

            <div class="lista-candidatos mb-3">
                <button class="btn btn-outline-dark mb-1">Luana Gonçalves</button>
                <button class="btn btn-outline-dark mb-1">Manoela Pessanha</button>
                <button class="btn btn-outline-dark mb-1">Aline Gomes</button>
                <button class="btn btn-outline-dark mb-1">Nathália Delvaux</button>
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-confirma">CONFIRMA</button>
                <button class="btn btn-light border">BRANCO</button>
            </div>
        </div>

    </div>
</div>

</body>
</html>
