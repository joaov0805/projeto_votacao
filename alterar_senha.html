<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilo personalizado -->
    <style>
        /* Caixa geral que simula o corpo da urna */
        .urna {
            background: #d6d6d6;
            padding: 40px;
            border-radius: 12px;
            width: 500px;
            border: 3px solid #bdbdbd;
        }

        /* Tela branca com borda preta */
        .tela {
            background: white;
            border: 4px solid black;
            border-radius: 8px;
        }

        /* Título central */
        .tela h3 {
            font-size: 26px;
            letter-spacing: 1px;
            color: #333;
        }

        .btn-confirmar {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }

        .btn-confirmar:hover {
            background-color: #3e8e41;
        }
    </style>

</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="urna shadow-lg">
    
    <div class="tela p-5">

        <h3 class="text-center fw-bold mb-4">Alteração de Senha</h3>

        <form action="alterar_senha_processa.php" method="POST">

            <div class="mb-3">
                <label class="form-label fw-bold">Senha Atual</label>
                <input type="password" name="senha_atual" 
                       class="form-control form-control-lg" 
                       placeholder="Digite sua senha atual" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Nova Senha</label>
                <input type="password" name="nova_senha" 
                       class="form-control form-control-lg" 
                       placeholder="Digite a nova senha" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Confirmar Nova Senha</label>
                <input type="password" name="confirmar_senha" 
                       class="form-control form-control-lg" 
                       placeholder="Confirme a nova senha" required>
            </div>

            <button type="submit" 
                    class="btn btn-confirmar w-100 btn-lg">
                ALTERAR SENHA
            </button>

        </form>

    </div>

</div>

</body>
</html>
