<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulação de Votação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap/votacao.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">
    <div class="row">

        <!-- Área principal -->
        <div class="col-md-9">
            <div class="urna">
                <img src="img/103-1036161_brazil-coat-of-arms-republica-federativa-do-brasil-brazil-coat-of-arms.png" class="img-fluid mx-auto d-block" width="130" >

                <!-- Cabeçalho -->
                <div class="text-center mb-3">
                    <h5 class="mt-2">SEU VOTO PARA</h5>
                    <h4><strong>Conselheiro</strong></h4>
                    
                </div>

                <!-- Conteúdo -->
                <div class="row">
                    <div class="col-md-8">
                        <p><strong>Número:</strong> <span id="numero"></span></p>
                        <p><strong>Nome:</strong> <span id="nome"></span></p>
                    </div>

                    <div class="col-md-4 text-center">
                        <div class="candidato-foto" style="display: none;"> 
                            <img id="foto" src="" class="img-fluid">
                            <div><strong id="cargo"></strong></div>
                        </div>
                    </div>
                </div>

                <!-- Rodapé -->
                <div class="rodape row">
                    <div class="col-md-6">
                        <p><strong>Aperte a tecla:</strong><br>
                        CONFIRMA para CONFIRMAR este voto.</p>
                    </div>
                   
                    <div class="col-md-6 text-end">
                        <p>CLIQUE no nome para<br>
                        ESCOLHER seu candidato</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- Lateral direita -->
        <div class="col-md-3">
            <h6 class="text-center mb-2">Escolha seu candidato</h6>

            <div class="lista-candidatos mb-3">
                
                <button class="btn btn-outline-dark mb-1 candidato"
                    data-numero="04"
                    data-nome= "Katia Mendes"
                    data-foto= "img/small_Katia_Mendes_a0edf2a28a.png"
                    data-cargo= "Conselheira">
                    Katia Mendes
                </button>
                    
                <button class="btn btn-outline-dark mb-1 candidato"
                    data-numero= "05"
                    data-nome= "Thaise"
                    data-foto="img/small_Thaisse_9c255a8148.png"
                    data-cargo="Conselheira">
                    Thaise
                </button>
                
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-confirma" id="btn-confirmar">CONFIRMA</button>
                <button class="btn btn-light border" id="btn-branco">BRANCO</button>
            </div>
        </div>

    </div>
</div>
<script src="Sricpt/conselheiro.js"></script>
</body>
</html>
